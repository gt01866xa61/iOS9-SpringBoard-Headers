name: Deploy MRT map to GitHub Pages

on:
  push:
    branches: ["claude/taiwan-mrt-realtime-tracker-zgzv9s"]
    paths:
      - "taiwan_mrt_tracker/**"
      - ".github/workflows/deploy-mrt-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: taiwan_mrt_tracker
      - id: deployment
        uses: actions/deploy-pages@v4
