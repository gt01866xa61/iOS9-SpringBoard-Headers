name: Restore signals Pages (one-shot)

# 一次性還原：捷運地圖的部署誤蓋了 gooaye_signals 的 Pages 站台。
# 此 workflow 從 master 重建訊號燈網站並部署回去，跑完即由後續 commit 移除。
# 不 commit 任何東西回 master（不碰 history.json）。

on:
  push:
    branches: ["claude/taiwan-mrt-realtime-tracker-zgzv9s"]
    paths: [".github/workflows/deploy-mrt-pages.yml"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (best-effort)
        continue-on-error: true
        run: pip install -r gooaye_signals/requirements.txt

      # 盡力抓最新資料；失敗就部署 repo 內既有的 index.html（頁面自帶 stale 警示）
      - name: Build fresh signals (best-effort)
        continue-on-error: true
        working-directory: gooaye_signals
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python build.py
          python web/build_embed.py

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gooaye_signals/web

      - id: deployment
        uses: actions/deploy-pages@v4
