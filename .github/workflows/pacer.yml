name: pacer

# 接力節拍器 —— GitHub cron 丟包的備援。
#
# 為什麼存在：GitHub 官方文件明載 schedule 事件高負載時會延遲甚至直接丟棄；
# 實測 2026-07-06（週一）本 repo 排程投遞率 ~1/14，改離峰分鐘後仍大量丟班。
# 訊號燈的核心承諾是盤中即時，不能只靠 cron。
#
# 環的形狀（兩條邊都是明確 workflow_dispatch）：
#   build 最後一步發車 pacer → pacer 睡到下一班時間 → 發車 build → 循環。
#   ⚠ 不能靠 workflow_run 級聯：實測 GITHUB_TOKEN 補發的班次「本身會跑」
#   （workflow_dispatch 是防遞迴例外），但「它跑完」不會再觸發 workflow_run
#   （2026-07-06/07 三次鏈全數精確斷在補發班之後）。下方 workflow_run 觸發
#   僅作 push/cron 班次的冗餘入口。
#
# 睡眠邏輯：
#   交易時段內（台北 09–21:59 平日）：睡 22 分鐘後補發下一班。
#   窗外但下一個平日窗口在 5.5 小時內（如台北 06:47 每日班次跑完）：睡到 09:17 開鏈。
#   其餘（深夜/週末）：直接結束，鏈自然斷，隔天早上每日班次重啟。
#
# 防失控三道閘：
#   1. 發車前重查時段——鏈在窗外自動死亡，每日至多 ~36 棒。
#   2. 發車前查 signals.yml 是否已有 queued/in_progress——cron 若自己來了就不重複發。
#   3. concurrency cancel-in-progress——多條鏈收斂成一條（新完成的 run 取代還在睡的）。
#
# 鏈的存活保證（2026-07-09 佇列取消事故後加固）：每一棒在窗內睡醒後「永遠自派
# 下一棒」，不依賴 build 是否真的跑起來；build 健康時其 Relay 棒會取代自派棒。
# 唯一救不了的情況：pacer 自己也拿不到 runner（GitHub 全面故障）→ 靠 cron/push/
# 每日班次在故障復原後重啟，期間頁面 stale 橫幅誠實示警。

on:
  workflow_dispatch: {}   # 主入口：build 最後一步明確發車
  workflow_run:           # 冗餘入口：push/cron 觸發的 build 跑完也會接（補發班不會）
    workflows: [build-and-deploy-signals]
    types: [completed]

permissions:
  actions: write   # gh workflow run 需要

concurrency:
  group: pacer
  cancel-in-progress: true

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 睡到下一班發車時間，補發 signals build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 目標時刻：窗內 → 22 分鐘後；平日窗前且 5.5h 內 → 當日 01:17Z；其餘 → 0（不接力）
          target=$(python3 - <<'PYEOF'
          import datetime as d
          now = d.datetime.now(d.timezone.utc)
          if now.weekday() < 5 and 1 <= now.hour <= 13:
              print(int((now + d.timedelta(minutes=22)).timestamp()))
          else:
              nxt = now.replace(hour=1, minute=17, second=0, microsecond=0)
              while nxt <= now or nxt.weekday() >= 5:
                  nxt = (nxt + d.timedelta(days=1)).replace(hour=1, minute=17)
              print(int(nxt.timestamp()) if (nxt - now).total_seconds() <= 5.5 * 3600 else 0)
          PYEOF
          )
          if [ "$target" = "0" ]; then echo "窗外且下一窗太遠，鏈結束"; exit 0; fi
          wait=$(( target - $(date -u +%s) ))
          echo "睡 ${wait}s 後發車（$(date -u -d @$target '+%F %T')Z＝台北 $(date -u -d @"$((target+28800))" '+%H:%M')）"
          [ "$wait" -gt 0 ] && sleep "$wait"

          # 醒來重查：仍在交易時段才發車（睡眠可能跨日/跨窗）
          h=$(date -u +%H); dow=$(date -u +%u)
          if [ "$dow" -ge 6 ] || [ "$((10#$h))" -lt 1 ] || [ "$((10#$h))" -gt 13 ]; then
            echo "醒來已在窗外，鏈結束"; exit 0
          fi

          relay_failed=0

          # cron 若自己發車了就不重複（queued 或 in_progress 皆算）；
          # 查詢偶發失敗不視為有班（|| echo 0）——寧可多發一班靠 concurrency 收斂，
          # 也不讓一次 API 抖動殺死整條鏈
          q=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/signals.yml/runs?status=queued&per_page=1" --jq .total_count 2>/dev/null || echo 0)
          r=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/signals.yml/runs?status=in_progress&per_page=1" --jq .total_count 2>/dev/null || echo 0)
          if [ "${q:-0}" -gt 0 ] || [ "${r:-0}" -gt 0 ]; then
            echo "已有班次在跑/排隊，本輪不發 build"
          else
            sent=0
            for i in 1 2 3; do
              if gh workflow run signals.yml --ref master -R "$GITHUB_REPOSITORY"; then
                sent=1; echo "已補發下一班 build"; break
              fi
              sleep 5
            done
            if [ "$sent" != "1" ]; then
              echo "::warning::build 補發失敗"
              relay_failed=1
            fi
          fi

          # 自派下一棒 pacer——鏈的存活不能依賴「build 有跑起來」：2026-07-09 實測
          # GitHub runner 供應異常時，build job 在佇列排 15 分鐘拿不到 runner 被平台
          # 取消、零 step 執行，build 端的 Relay 與 workflow_run 兩條邊都不會發生，
          # 鏈就死了。自派讓每一棒睡醒後永遠有下一棒；build 健康時它的 Relay 棒
          # （較新）會透過 concurrency 取代這根自派棒，節奏仍錨定 build 完成時間。
          ok=0
          for i in 1 2 3; do
            if gh workflow run pacer.yml --ref master -R "$GITHUB_REPOSITORY"; then
              ok=1; echo "已自派下一棒"; break
            fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "::warning::自派失敗——若 build 也沒跑起來，鏈將暫停待 cron/push 重啟"
            relay_failed=1
          fi
          [ "$relay_failed" = "0" ] || exit 1
