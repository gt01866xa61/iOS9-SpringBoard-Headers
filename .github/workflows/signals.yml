name: build-and-deploy-signals

# 排程算訊號 + 部署網頁到 GitHub Pages。
# 只上傳 gooaye_signals/web/（含當輪產生的 data/signals.json），System/、usr/ 的 iOS dump 不會被發佈。
# 注意：schedule 只在預設分支(master)生效；正式 build-deploy 也只接受 master ref。
#       上線前想先測，可到 Actions 分頁對這個 workflow 按 "Run workflow" 手動觸發。

on:
  schedule:
    # cron 在這裡的角色是「接力環的重啟票」不是節拍器（節拍由 pacer 環自持）。
    # GitHub 排程實測投遞率極低（2026-07-06 上午 14 班只發 1 班）且平台故障後
    # 鏈需要任一張票中獎才能復活——票越密、GitHub 復原後自癒越快。
    # 分鐘避開 :00/:30 尖峰（官方文件：高負載時段 schedule 會延遲甚至丟棄）。
    # 環健康時多餘的票會蓋掉自派棒、重新錨定節奏，由 dedup+concurrency 收斂，無疊班。
    - cron: "3,13,23,33,43,53 1-13 * * 1-5"   # 台北 09–21:59 平日每 10 分一張重啟票
    - cron: "47 22 * * *"                      # UTC 22:47 = 台北 06:47 每日保底（美股收盤後、隔日開鏈錨點）
  workflow_dispatch: {}
  push:
    # master 為唯一部署源：cron 排程只在 master 生效，push 也只認 master，避免其他 ref 互相覆蓋。
    # 開發流程：直接在 master 開發 → 本機驗證 → push → CI gate 通過後上線。
    branches: [master]
    paths:
      - "gooaye_signals/**"
      - "!gooaye_signals/data/history.json"   # 燈史由 bot commit，不再觸發（防循環）
      - ".github/workflows/signals.yml"
      - ".github/workflows/pacer.yml"          # 修改接力器後也要立刻重啟鏈

permissions:
  contents: write   # 需要把 data/history.json（燈號歷史）commit 回 repo
  pages: write
  id-token: write
  actions: write    # 最後一步發車 pacer 接力（gh workflow run）

# 同時間只跑一個 Pages 部署，且不取消進行中的（避免排程與手動觸發互相打架）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    # workflow_dispatch 可在 UI 選 ref；正式 Pages 與燈史只允許 master。
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gooaye_signals/requirements.txt

      - name: Install deps
        run: pip install -r gooaye_signals/requirements.txt

      # push master 才驗完整 gate；schedule 與 pacer 每 22 分鐘補發的 workflow_dispatch
      # 都跑同一個已驗證 commit，不重複消耗 runner。
      - name: Verify Phase 1-4 + demo build gate
        if: github.event_name == 'push'
        working-directory: gooaye_signals
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
          GOOAYE_DEMO: "1"
        run: |
          python tests/test_phase1_specs.py
          python tests/test_phase2_compute.py
          python tests/test_phase3_build.py
          python tests/test_phase4_frontend.py
          python build.py
          python web/build_embed.py

      # demo build 會寫 last_good；正式抓取前清掉，避免來源失敗時把示範值當上一筆真值。
      - name: Remove demo artifacts before live build
        if: github.event_name == 'push'
        working-directory: gooaye_signals
        run: |
          rm -rf data/cache
          rm -f data/signals.json web/data/signals.json

      # 還原上輪抓取快取（last-good）：來源短暫故障時卡片顯示舊圖+「資料較舊」而非灰燈
      - name: Restore fetch cache (last-good)
        uses: actions/cache@v4
        with:
          path: gooaye_signals/data/cache
          key: signals-cache-${{ github.run_id }}
          restore-keys: |
            signals-cache-

      - name: Build signals + embed fallback
        working-directory: gooaye_signals
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python build.py
          python web/build_embed.py

      # 燈號歷史 commit 回 repo 持久化（GITHUB_TOKEN 的 push 不會再觸發 workflow，無循環風險）
      # 注意：build_embed 會改寫 index.html 弄髒工作區，rebase 前必須先 stash 該檔，
      #       且 push 可能與開發者推送互撞 → rebase+重試三次
      - name: Persist light history
        run: |
          git config user.name "signals-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gooaye_signals/data/history.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(signals): update light history [skip ci]"
            stashed=0
            if ! git diff --quiet -- gooaye_signals/web/index.html; then
              git stash push -- gooaye_signals/web/index.html
              stashed=1
            fi
            ok=0
            for i in 1 2 3; do
              if git push origin HEAD:master; then ok=1; break; fi
              if ! git pull --rebase origin master; then
                git rebase --abort || true
                echo "::warning::history rebase failed; aborted cleanly, stop retrying"
                break
              fi
            done
            if [ "$ok" != "1" ]; then echo "::warning::history push failed (non-fatal)"; fi
            if [ "$stashed" = "1" ]; then
              # 不 pop 舊版產生檔：rebase 可能帶進新版 index.html，直接在最新 HEAD 重做內嵌最安全。
              git stash drop
              python gooaye_signals/web/build_embed.py
            fi
          fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true   # Pages 已由擁有者開通（Source=GitHub Actions）；保留此參數作保險

      # artifact 名稱帶 run_attempt：同一個 run 按 Re-run 時不會與上次嘗試的同名 artifact
      # 相撞（deploy-pages 找到兩個同名包會直接報錯 "Artifact count is 2"）
      - uses: actions/upload-pages-artifact@v3
        with:
          path: gooaye_signals/web
          name: pages-${{ github.run_id }}-${{ github.run_attempt }}

      # GitHub Pages 發佈偶爾回傳暫時性錯誤（"Deployment failed, try again later"）。
      # 實測 20 秒後重試一次仍可能連兩發都撞上（run #17），改成最多三次：
      # 失敗 → 等 30 秒重試 → 再失敗 → 等 60 秒最後一次。artifact 已上傳可重用。
      - id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          artifact_name: pages-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Wait before deploy retry 1
        if: steps.deploy.outcome == 'failure'
        run: sleep 30
      - id: deploy2
        name: Deploy to GitHub Pages (retry 1)
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          artifact_name: pages-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Wait before deploy retry 2
        if: steps.deploy2.outcome == 'failure'
        run: sleep 60
      - name: Deploy to GitHub Pages (retry 2)
        if: steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-${{ github.run_id }}-${{ github.run_attempt }}

      # 接力環的關鍵一棒：明確發車 pacer（不能靠 workflow_run 級聯——實測
      # GITHUB_TOKEN 補發的班次「本身會跑」但「跑完不會再觸發 workflow_run」，
      # 鏈 3/3 都精確斷在補發班之後；workflow_dispatch 事件本身是防遞迴例外，
      # 所以 build→pacer、pacer→build 兩條邊都改走明確 dispatch，環才閉合）。
      # if: always()——build 中途失敗也要接棒，鏈不因單輪故障而死。
      - name: Relay to pacer
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in 1 2 3; do
            if gh workflow run pacer.yml --ref master -R "$GITHUB_REPOSITORY"; then
              echo "pacer 已接棒"; exit 0
            fi
            sleep 5
          done
          echo "::warning::pacer 接棒失敗——接力暫停，待下一班 cron/push 重啟"
          exit 1
