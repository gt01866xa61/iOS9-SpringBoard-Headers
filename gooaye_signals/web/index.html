<title>股癌訊號燈</title>
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --line:#21262d; --fg:#e6edf3; --muted:#8b949e;
    --green:#2ea043; --yellow:#d29922; --red:#da3633; --gray:#484f58;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
       font:15px/1.55 -apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
       -webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:16px 14px 40px}
  h1{font-size:18px;margin:2px 0 2px;letter-spacing:.5px}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .banner{border-radius:8px;padding:8px 10px;font-size:13px;margin:10px 0;display:none}
  .banner.sample{background:#1c2333;color:#c9d1d9;border:1px solid var(--line);display:block}
  .banner.stale{background:#3a2d12;color:#f0d9a0;border:1px solid #5c471d;display:block}
  .master{display:flex;align-items:center;gap:10px;background:var(--card);
          border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0}
  .master .dot{width:18px;height:18px;flex:0 0 auto}
  .master b{font-size:17px}
  .master .rr{color:var(--muted);font-size:12px;margin-top:2px}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block}
  .cluster{margin:22px 0 8px}
  .chead{display:flex;align-items:center;gap:8px;margin:6px 2px}
  .chead .cname{font-weight:700}
  .clabel{font-size:12px;color:var(--muted)}
  .creason{color:var(--muted);font-size:12px;margin:0 2px 8px}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gray);
        border-radius:12px;padding:12px 14px;margin:10px 0;overflow:hidden}
  .card.green{border-left-color:var(--green)}
  .card.yellow{border-left-color:var(--yellow)}
  .card.red{border-left-color:var(--red)}
  .card.gray{border-left-color:var(--gray)}
  .hrow{display:flex;align-items:baseline;justify-content:space-between;gap:8px;min-width:0}
  .hname{font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hval{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap;flex:0 0 auto}
  .badge{font-size:11px;background:var(--yellow);color:#000;border-radius:6px;padding:1px 6px;margin-left:6px}
  .viz{margin:8px 0 4px}
  .viz svg{display:block}
  .interp{color:#c9d1d9;font-size:13px;margin-top:6px}
  .kv{font-size:12.5px;color:#b9c4d0;margin-top:7px;line-height:1.5}
  .klabel{display:inline-block;font-size:10px;color:var(--muted);border:1px solid var(--line);
          border-radius:4px;padding:0 5px;margin-right:6px;vertical-align:1px;letter-spacing:1px}
  .legend{margin-top:9px;border-top:1px dashed var(--line);padding-top:8px;
          display:flex;flex-direction:column;gap:4px}
  .lg{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:var(--muted);opacity:.5}
  .lg .rdot{margin-top:4px;flex:0 0 auto}
  .lg.cur{opacity:1;color:var(--fg)}
  .nowtag{font-size:10px;background:var(--line);border-radius:4px;padding:0 4px;margin-right:5px;white-space:nowrap}
  .meta{color:var(--muted);font-size:11px;margin-top:8px}
  details{margin:6px 0 2px}
  summary{color:var(--muted);font-size:13px;cursor:pointer;padding:6px 2px}
  table.qt{width:100%;border-collapse:collapse;font-size:12px}
  table.qt th{color:var(--muted);font-weight:500;text-align:right;padding:4px 6px;border-bottom:1px solid var(--line)}
  table.qt th:first-child{text-align:left}
  table.qt td{text-align:right;padding:5px 6px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  table.qt td:first-child{text-align:left}
  .rdot{width:9px;height:9px;border-radius:50%;display:inline-block}
  footer{color:var(--muted);font-size:11px;margin-top:26px;border-top:1px solid var(--line);padding-top:12px}
  .err{color:#f0a1a1}
</style>
</head>

<script>
const SCHEMA = 1;
const REFRESH_MS = 3 * 60 * 1000;
const STALE_MIN = 90;
const COLORS = {green:"#2ea043", yellow:"#d29922", red:"#da3633", gray:"#484f58"};
const esc = (s) => String(s == null ? "" : s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

/* ===== Widget 分派：唯一「每種顯示」的程式碼。新增用既有 widget 的訊號不用碰這裡。 ===== */
const WIDGETS = {
  light_card: (wd) => wd && wd.big ? `<div class="viz"><b>${esc(wd.big)}</b></div>` : "",
  bar_chart:  (wd) => barSVG(wd.series || [], wd.labels || [], wd),
  gauge:      (wd) => gaugeSVG(wd.percent, wd),
  sparkline:  (wd) => sparkSVG(wd.series || [], wd),
  table:      (wd) => tableHTML(wd.columns || [], wd.rows || [], wd.caption),
};
function renderUnknown(_wd, sig){ return `<div class="interp">尚未支援的 widget：${esc(sig.widget)}</div>`; }

function barSVG(series, labels, wd){
  if(!series.length) return "";
  const W=320,H=120,pad=20;
  const max=Math.max(...series,0), min=Math.min(...series,0), range=(max-min)||1;
  const bw=(W-2*pad)/series.length;
  const y0=H-pad-((0-min)/range)*(H-2*pad);
  let bars="";
  series.forEach((v,i)=>{
    const x=pad+i*bw+bw*0.15, w=bw*0.7;
    const yv=H-pad-((v-min)/range)*(H-2*pad);
    const top=Math.min(yv,y0), h=Math.max(Math.abs(yv-y0),1);
    const hl=(i===wd.highlight_index);
    const col=v<0?(hl?"#f0a1a1":"#da3633"):(hl?"#7ee2a0":"#2ea043");
    bars+=`<rect x="${x.toFixed(1)}" y="${top.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" fill="${col}" rx="1"/>`;
  });
  const zero=wd.zero_line?`<line x1="${pad}" y1="${y0.toFixed(1)}" x2="${W-pad}" y2="${y0.toFixed(1)}" stroke="#8b949e" stroke-dasharray="3 3"/>`:"";
  const idxs=[0,Math.floor(series.length/2),series.length-1];
  const anc=(i)=> i===0?"start" : i===series.length-1?"end" : "middle";
  const lx=(i)=> i===0?pad : i===series.length-1?(W-pad) : (pad+i*bw+bw/2);
  const lbls=idxs.map(i=>labels[i]?`<text x="${lx(i).toFixed(1)}" y="${H-4}" fill="#8b949e" font-size="9" text-anchor="${anc(i)}">${esc(labels[i])}</text>`:"").join("");
  return `<div class="viz"><svg viewBox="0 0 ${W} ${H}" width="100%">${zero}${bars}${lbls}</svg></div>`;
}

function gaugeSVG(pct, wd){
  if(pct==null) return "";
  const W=320,H=56,pad=12,bw=W-2*pad,y=28;
  const bands=wd.bands||[{to:100,light:"green"}];
  let segs="",prev=0;
  bands.forEach(b=>{
    const x1=pad+bw*prev/100, x2=pad+bw*b.to/100;
    segs+=`<rect x="${x1.toFixed(1)}" y="${y}" width="${(x2-x1).toFixed(1)}" height="10" fill="${COLORS[b.light]||"#484f58"}" opacity="0.55"/>`;
    prev=b.to;
  });
  const mx=pad+bw*Math.max(0,Math.min(100,pct))/100;
  const marker=`<line x1="${mx.toFixed(1)}" y1="${y-8}" x2="${mx.toFixed(1)}" y2="${y+18}" stroke="#e6edf3" stroke-width="2"/>`;
  const ticks=[40,60].map(t=>`<text x="${(pad+bw*t/100).toFixed(1)}" y="${y+30}" fill="#8b949e" font-size="9" text-anchor="middle">${t}</text>`).join("");
  const cap=wd.caption?`<text x="${W/2}" y="14" fill="#8b949e" font-size="11" text-anchor="middle">${esc(wd.caption)}</text>`:"";
  return `<div class="viz"><svg viewBox="0 0 ${W} ${H}" width="100%">${cap}${segs}${marker}${ticks}</svg></div>`;
}

function sparkSVG(series, wd){
  if(!series || series.length<2) return "";
  const W=320,H=64,pad=6;
  // 若後端有給 ma_series（如 50MA），與主線共用同一座標刻度，畫成灰虛線
  const ma=(wd.ma_series && wd.ma_series.length===series.length)?wd.ma_series:null;
  const all=ma?series.concat(ma):series;
  const max=Math.max(...all),min=Math.min(...all),range=(max-min)||1;
  const step=(W-2*pad)/(series.length-1);
  const pt=(v,i)=>`${(pad+i*step).toFixed(1)},${(H-pad-((v-min)/range)*(H-2*pad)).toFixed(1)}`;
  const col=series[series.length-1]>=series[0]?"#2ea043":"#da3633";
  const maLine=ma?`<polyline points="${ma.map(pt).join(" ")}" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4 3"/>`:"";
  const cap=wd.caption?`<text x="6" y="12" fill="#8b949e" font-size="10.5">${esc(wd.caption)}</text>`:"";
  return `<div class="viz"><svg viewBox="0 0 ${W} ${H}" width="100%">${maLine}<polyline points="${series.map(pt).join(" ")}" fill="none" stroke="${col}" stroke-width="2"/>${cap}</svg></div>`;
}

function miniSpark(s){
  if(!s || s.length<2) return "";
  const W=60,H=18;
  const max=Math.max(...s),min=Math.min(...s),range=(max-min)||1;
  const step=W/(s.length-1);
  const pts=s.map((v,i)=>`${(i*step).toFixed(1)},${(H-((v-min)/range)*H).toFixed(1)}`).join(" ");
  const col=s[s.length-1]>=s[0]?"#2ea043":"#da3633";
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5"/></svg>`;
}

function tableHTML(cols, rows, caption){
  if(!rows.length) return "";
  const cap=caption?`<div class="meta" style="margin:2px 0 6px">${esc(caption)}</div>`:"";
  const head=`<tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>`;
  const body=rows.map(r=>{
    const cells=(r.cells||[]).map(c=>`<td>${esc(c)}</td>`).join("");
    const dot=r.dot?`<td><span class="rdot" style="background:${COLORS[r.dot]||"#484f58"}"></span></td>`:"<td></td>";
    const sp=`<td>${miniSpark(r.spark||[])}</td>`;
    return `<tr>${cells}${dot}${sp}</tr>`;
  }).join("");
  return `<div class="viz">${cap}<table class="qt">${head}${body}</table></div>`;
}

/* ===== 卡片 / cluster / 整頁 ===== */
function legendHTML(sig){
  // ③各狀態含義：三燈全列出、當前燈高亮＋「現在」標記。舊資料沒有 interpretations 時退回單句。
  const it=sig.interpretations;
  if(!it) return sig.interpretation?`<div class="interp">${esc(sig.interpretation)}</div>`:"";
  const keys=["green","yellow","red"]; if(sig.light==="gray") keys.push("gray");
  const rows=keys.map(k=>{
    const cur=(k===sig.light);
    return `<div class="lg ${cur?"cur":""}"><span class="rdot" style="background:${COLORS[k]}"></span>
      <span>${cur?'<span class="nowtag">現在</span>':""}${esc(it[k]||"")}</span></div>`;
  }).join("");
  return `<div class="legend">${rows}</div>`;
}

const CADENCE_LABEL={monthly:"月更(上月數據約每月10日公布)",trading_day:"每交易日更新",daily:"每日更新",manual:"手動更新"};

function renderSignal(sig){
  const body=(WIDGETS[sig.widget]||renderUnknown)(sig.widget_data||{}, sig);
  const badge=sig.stale?'<span class="badge">資料較舊</span>':"";
  const track=sig.track?`<div class="kv"><span class="klabel">追什麼</span>${esc(sig.track)}</div>`:"";
  const shape=sig.shape?`<div class="kv"><span class="klabel">怎麼看</span>${esc(sig.shape)}</div>`:"";
  // meta：月更訊號標明「資料至哪個月」，其餘標更新節奏，避免把抓取時間誤讀成資料新鮮度
  const cad=CADENCE_LABEL[sig.cadence]||sig.cadence;
  const ls=(sig.widget_data||{}).labels||[];
  const upto=(sig.cadence==="monthly"&&ls.length)?`資料至 ${ls[ls.length-1]} · `:"";
  const ep=[sig.episode_ref,sig.episode_date].filter(x=>x&&x!=="?").join(" ");
  return `<div class="card ${sig.light}">
    <div class="hrow"><span class="hname">${esc(sig.name)}${badge}</span><span class="hval">${esc(sig.value_label)}</span></div>
    ${track}
    ${body}
    ${shape}
    ${legendHTML(sig)}
    <div class="meta">${esc(upto)}${esc(cad)}${ep?" · "+esc(ep):""}${sig.updated_at?` · 更新 ${esc(sig.updated_at.slice(5,16).replace("T"," "))}`:""}</div>
  </div>`;
}

function renderCluster(c){
  const m=c.master||{light:"gray",label:"",reason:""};
  const votes=m.votes?`（紅${m.votes.red||0} 黃${m.votes.yellow||0} 綠${m.votes.green||0}）`:"";
  const head=`<div class="chead"><span class="dot" style="background:${COLORS[m.light]}"></span>
    <span class="cname">${esc(c.name)}</span><span class="clabel">· ${esc(m.label)} ${votes}</span></div>
    <div class="creason">${esc(m.reason)}</div>`;
  const sigs=(c.signals||[]).map(renderSignal).join("");
  const sup=(c.supporting||[]).length
    ? `<details><summary>補充面板（${c.supporting.length}）</summary>${c.supporting.map(renderSignal).join("")}</details>`
    : "";
  return `<div class="cluster">${head}${sigs}${sup}</div>`;
}

function render(d, live){
  const ml=d.master_light||"gray";
  document.getElementById("master").innerHTML=
    `<span class="dot" style="background:${COLORS[ml]}"></span>
     <div><b>總燈號：${esc(d.master_reason||ml)}</b>
     <div class="rr">${d.generated_at_label?("更新於 "+esc(d.generated_at_label)):""}</div></div>`;
  document.getElementById("root").innerHTML=
    (d.clusters||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0)).map(renderCluster).join("");

  const errs=(d.errors||[]).map(e=>esc(e.signal_id)).join("、");
  document.getElementById("footer").innerHTML=
    (errs?`<div class="err">資料來源異常：${errs}</div>`:"")+
    `<div>${esc(d.next_update_hint||"")}</div>`+
    `<div>${esc(d.tz||"")}　資料來源：FinMind / yfinance（延遲約 15 分）</div>`;

  // banners
  document.getElementById("sample").style.display = live ? "none" : "block";
  let staleShow=false;
  if(live && d.generated_at){
    const ageMin=(Date.now()-Date.parse(d.generated_at))/60000;
    staleShow = ageMin > STALE_MIN;
  }
  document.getElementById("stale").style.display = staleShow ? "block" : "none";
}

async function load(){
  let data=JSON.parse(document.getElementById("embedded").textContent);
  let live=false;
  try{
    const r=await fetch("data/signals.json?t="+Date.now(), {cache:"no-store"});
    if(r.ok){ const j=await r.json(); if(j && j.schema_version===SCHEMA){ data=j; live=true; } }
  }catch(_){}
  render(data, live);
}

load();
setInterval(load, REFRESH_MS);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) load(); });
window.addEventListener("focus", load);
</script>
</body>
</html>
